services:
  - type: web
    name: virtual-office-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace @virtual-office/server
    startCommand: npm run start --workspace @virtual-office/server
    envVars:
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: SESSION_COOKIE_NAME
        value: virtual_office_session
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_REDIRECT_URI
        sync: false
      - key: ENABLE_SLACK_MOCK
        value: false
